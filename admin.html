<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f4ef">
    <title>Administration - Château de Presles</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .admin-shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 18px 56px;
      }

      .admin-intro {
        display: grid;
        gap: 14px;
        margin-bottom: 22px;
      }

      .admin-actions,
      .admin-toolbar,
      .editor-grid,
      .admin-panel,
      .field-stack,
      .media-grid,
      .collection-item,
      .language-row {
        display: grid;
        gap: 12px;
      }

      .admin-toolbar {
        grid-template-columns: 1fr;
      }

      .admin-actions {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      }

      .admin-button,
      .admin-file,
      .admin-select {
        min-height: 46px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        padding: 12px 14px;
        cursor: pointer;
      }

      .admin-button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .admin-button.danger {
        color: var(--accent);
      }

      .editor-grid {
        grid-template-columns: 1fr;
      }

      .section-list,
      .editor-panel {
        border: 1px solid var(--line);
        background: #fff;
      }

      .section-list {
        max-height: 72svh;
        overflow: auto;
      }

      .section-tab {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 10px;
        align-items: center;
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        padding: 12px;
        text-align: left;
        cursor: pointer;
      }

      .section-tab.active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .section-tab-icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        background: var(--soft);
        border: 1px solid var(--line);
        font-size: 0.76rem;
        text-transform: uppercase;
      }

      .editor-panel {
        padding: 18px;
      }

      .admin-panel {
        padding: 18px 0;
        border-top: 1px solid var(--line);
      }

      .admin-panel:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .admin-panel h2 {
        font-size: 1.25rem;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        padding: 12px;
      }

      textarea {
        min-height: 128px;
        resize: vertical;
      }

      .media-preview {
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--soft);
      }

      .media-preview img,
      .media-preview video {
        display: block;
        width: 100%;
        max-height: 260px;
        object-fit: cover;
      }

      .collection-item {
        padding: 14px;
        border: 1px solid var(--line);
        background: var(--paper);
      }

      .admin-note,
      .status-line {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.55;
      }

      .status-line {
        min-height: 24px;
      }

      @media (min-width: 900px) {
        .admin-toolbar {
          grid-template-columns: 230px 1fr;
          align-items: start;
        }

        .editor-grid {
          grid-template-columns: 320px 1fr;
          align-items: start;
        }

        .media-grid,
        .language-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-title">Château de Presles</span>
        <span class="brand-subtitle">Résidence artistique de la MNA Taylor</span>
      </a>
    </header>

    <main class="admin-shell">
      <section class="admin-intro">
        <p class="kicker">Administration</p>
        <h1>Contenu</h1>
        <p class="summary">Modifiez les textes, médias, langues et rubriques. Publier met à jour le site en ligne. Télécharger le fichier sert seulement de sauvegarde.</p>
      </section>

      <section class="admin-toolbar">
        <label>
          Langue éditée
          <select class="admin-select" id="language-select"></select>
        </label>
        <div class="admin-actions">
          <button class="admin-button primary" id="save-local" type="button">Publier en ligne</button>
          <button class="admin-button" id="download-json" type="button">Télécharger une sauvegarde</button>
          <label class="admin-file">Importer une sauvegarde<input id="import-json" type="file" accept="application/json" hidden></label>
          <button class="admin-button" id="add-language" type="button">Ajouter une langue</button>
          <button class="admin-button" id="add-section" type="button">Ajouter une rubrique</button>
          <a class="admin-button" href="cuisine.html">Espace cuisine</a>
          <button class="admin-button danger" id="reset-local" type="button">Recharger le site en ligne</button>
        </div>
      </section>

      <p class="status-line" id="status-line"></p>

      <section class="editor-grid">
        <nav class="section-list" id="section-list" aria-label="Rubriques"></nav>
        <form class="editor-panel" id="editor"></form>
      </section>
    </main>

    <script src="admin.js" defer></script>
  </body>
</html>
